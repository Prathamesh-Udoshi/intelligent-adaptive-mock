services:
  - type: web
    name: adaptive-mock-platform
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn src.mock_server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: adaptive-mock-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: PLATFORM_MODE
        value: proxy
      - key: LEARNING_ENABLED
        value: "true"

databases:
  - name: adaptive-mock-db
    plan: free
